<!--(пример textarea + select + option)-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>Формы и интерактивные элементы</title>
        <link rel='stylesheet' href='../../css/3.css'>
    </head>
    <body>

        <h2>Комментарий</h2>

        <textarea rows="4" cols="40">
            Введите комментарий
        </textarea>

        <br><br>

        Выберите город:

        <select>
            <option>Москва</option>
            <option>Санкт-Петербург</option>
            <option>Казань</option>
        </select>

        <br>

        <select>
            <optgroup label="Россия">
                <option>Москва</option>
                <option>Санкт-Петербург</option>
                <option>Ярославль</option>
            </optgroup>

            <optgroup label="Германия">
                <option>Берлин</option>
                <option>Гамбург</option>
                <option>Мюнхен</option>
            </optgroup>
            
            <optgroup label="США">
                <option>Нью-Йорк</option>
                <option>Лос-Анджелес</option>
                <option>Чикаго</option>
            </optgroup>
        </select>
    </body>
</html>
